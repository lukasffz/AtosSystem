<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuário - AtosSystem</title>
    <link rel="stylesheet" href="./style/styleUsuario.css">
</head>
<body>
      <header class="topo">
        <div class="cabeca">
            <div class="logoHeader">
                <a href="./index.html"><img src="./imagens/cabecalhoFinal.png" class="logo"></a>
            </div>

            <nav>
                <ul>
                    <li><a href="./indexConsultoria.html">Consultoria</a></li>
                    <li><a href="./indexDesenvolvimento.html">Desenvolvimento</a></li>
                    <li><a href="./index.html#contato">Contato</a></li>
                </ul>
            </nav>
            <div><a href="indexLogin.html"><img src="./imagens/icones/iconUsuarioBranco.png" alt="Login"></a></div>
        </div>
    </header>
    <main>
        <section id="projetos">
            <div class="containerBoxes">
                <div class="boxPrincipal">
                    <div class="titulo"><h3>Acompanhamento do Projeto</h3></div>
                    <div class="descricao"><p>Progresso Geral do Projeto</p></div>
                    <div class="container">
                        <div class="barra-loading">65%</div>
                    </div>
                    <div class="status">
                        <div class="boxStatus">
                            <div class="concluido"></div> <p>Concluído</p>
                        </div>
                        <div class="boxStatus">
                            <div class="andamento"></div> <p>Andamento</p>
                        </div>
                        <div class="boxStatus">
                            <div class="restante"></div> <p>Restante</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section id="sectionOP">
            <div class="containerOP">
                <div class="boxPrincipal">
                    <div class="titulo"><h3>Prazo do Projeto</h3></div>
                    <div class="status">
                        <div class="boxStatus">
                            <div class="statusPrazo"></div> <p>Em dia</p>
                        </div>
                    </div>
                </div>
                <div class="boxPrincipal">
                    <div class="titulo"><h3>Orçamento</h3></div>
                    <div class="status">
                        <div class="boxStatus">
                            <div class="statusOrcamento"></div> <p>Pendente</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <section class="footerImgCopy">
            <img src="./imagens/logoEscura-removebg-preview.png" alt="AtosSystem" width="50px">
            &copy; AtosSystem | 2026
        </section>
    </footer>
</body>
</html>
